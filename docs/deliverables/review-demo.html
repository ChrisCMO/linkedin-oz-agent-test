<style>
:root{--bg:#fafaf9;--surface:#fff;--surface-hover:#f5f5f4;--border:#e7e5e4;--border-light:#f0efed;--text:#1c1917;--text-s:#78716c;--text-m:#a8a29e;--accent:#1d4ed8;--approve:#15803d;--approve-h:#166534;--approve-bg:#f0fdf4;--skip-fg:#dc2626;--skip-b:#fecaca;--skip-bg:#fef2f2}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);font-family:'DM Sans',-apple-system,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
.hdr{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:40px 0 36px}
.hdr-in{max-width:840px;margin:0 auto;padding:0 32px}
.hdr-brand{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.4);margin-bottom:14px;font-weight:500}
.hdr-title{font-size:28px;font-weight:700;letter-spacing:-.5px}
.hdr-sub{font-size:14px;color:rgba(255,255,255,.55);margin-top:8px}
.body{max-width:840px;margin:0 auto;padding:32px 32px 140px}
.stats{display:flex;gap:1px;background:var(--border);border-radius:14px;overflow:hidden;margin-bottom:28px}
.stat{flex:1;background:var(--surface);padding:22px 24px;text-align:center}
.stat:first-child{border-radius:14px 0 0 14px}.stat:last-child{border-radius:0 14px 14px 0}
.stat-n{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-1px;line-height:1}
.stat-l{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-m);margin-top:6px;font-weight:500}
.btn-aa{width:100%;padding:15px 24px;background:var(--approve);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-bottom:32px;transition:background .15s}
.btn-aa:hover{background:var(--approve-h)}
.co-row{background:var(--surface);border:1px solid var(--border);padding:16px 22px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:14px;transition:background .12s}
.co-row:hover{background:var(--surface-hover)}
.co-row:first-child{border-radius:10px 10px 0 0}
.co-row+.co-row{border-top:none}
.co-row.open{border-bottom-color:transparent}
.co-l{display:flex;align-items:center;gap:12px;min-width:0}
.co-chev{font-size:10px;color:var(--text-m);width:14px;flex-shrink:0;transition:transform .2s;display:inline-block}
.co-chev.open{transform:rotate(90deg)}
.co-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.co-score{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:22px;border-radius:6px;font-size:11px;font-weight:700;flex-shrink:0;color:#fff}
.co-meta{font-size:12px;color:var(--text-m);white-space:nowrap}
.co-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.co-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.co-link{font-size:12px;color:var(--accent);text-decoration:none;font-weight:500}
.co-link:hover{text-decoration:underline}
.panel{background:var(--surface);border:1px solid var(--border);border-top:none;display:none}
.panel.open{display:block}
.panel:last-child{border-radius:0 0 10px 10px}
.ctx{padding:14px 22px;background:#fafaf9;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;gap:16px}
.ctx-meta{font-size:12px;color:var(--text-s)}
.ctx-toggle{background:none;border:none;color:var(--accent);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;padding:0;white-space:nowrap}
.ctx-toggle:hover{text-decoration:underline}
.detail{padding:18px 22px 20px;background:#fafaf9;border-bottom:1px solid var(--border-light);display:none}
.detail.open{display:block}
.detail-section{margin-bottom:16px}.detail-section:last-child{margin-bottom:0}
.detail-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text-m);margin-bottom:4px;font-weight:600}
.detail-text{font-size:13px;color:var(--text-s);line-height:1.6}
.detail-pills{display:flex;flex-wrap:wrap;gap:4px}
.detail-pill{font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text-s)}
.detail-pill strong{color:var(--text)}
.prospect{border-top:1px solid var(--border-light);transition:opacity .2s}
.prospect.approved{border-left:3px solid var(--approve)}
.prospect.skipped{opacity:.45;border-left:3px solid #d4d4d4}
.p-head{padding:20px 22px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.p-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.p-title{font-size:13px;color:var(--text-s);margin-top:4px;line-height:1.4}
.p-tags{display:flex;gap:10px;margin-top:10px;align-items:center;flex-wrap:wrap}
.p-act{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;letter-spacing:.3px;text-transform:uppercase}
.p-conn{font-size:11px;color:var(--text-m);font-variant-numeric:tabular-nums}

.p-link{font-size:12px;color:var(--accent);text-decoration:none;font-weight:500}

.badge-a{background:var(--approve-bg);color:var(--approve)}
.badge-s{background:#f5f5f4;color:#78716c}
.note{padding:6px 22px 14px}

.note-area{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;line-height:1.55;resize:none;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);min-height:52px;max-height:88px;transition:border-color .15s,box-shadow .15s}
.note-area:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,78,216,.08)}

.note-count{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text-m);margin-top:3px}
.note-count.warn{color:var(--skip-fg)}
.actions{padding:8px 22px 20px;display:flex;gap:10px;align-items:center}
.fb{flex:1;padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface)}
.fb:focus{outline:none;border-color:var(--accent)}
.fb:disabled{background:#fafaf9}
.btn-a{padding:9px 20px;background:var(--approve);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-a:hover{background:var(--approve-h)}
.btn-s{padding:9px 16px;background:transparent;color:var(--skip-fg);border:1px solid var(--skip-b);border-radius:8px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .15s}
.btn-s:hover{background:var(--skip-bg)}
.btn-u{background:none;border:none;color:var(--text-m);font-size:12px;font-family:inherit;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 28px;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.06);display:none}
.submit-bar.show{display:block}
.submit-in{max-width:840px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.submit-counts{font-size:13px;color:var(--text-s);font-variant-numeric:tabular-nums}
.submit-counts strong{color:var(--text)}
.btn-sub{padding:10px 28px;background:var(--approve);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s}
.btn-sub:hover{background:var(--approve-h)}
.confirm{min-height:100vh;display:flex;align-items:center;justify-content:center;display:none}
.confirm.show{display:flex}
.confirm-card{background:var(--surface);border-radius:16px;padding:52px 44px;max-width:440px;text-align:center;box-shadow:0 4px 32px rgba(0,0,0,.06)}
.confirm-check{width:56px;height:56px;border-radius:50%;background:var(--approve-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;color:var(--approve)}
.confirm-title{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px}
.confirm-body{font-size:14px;color:var(--text-s);line-height:1.7;margin-bottom:20px}
.confirm-hint{font-size:12px;color:var(--text-m)}
</style>
</head>

const SENDER = "Adrienne Nordland";
const prospects = RAW.prospects;
const companies = RAW.companies;
const state = {}; // id -> {status, editNote, feedback}

function scoreColor(s) {
  if (s >= 85) return "#14532d";
  if (s >= 75) return "#166534";
  if (s >= 65) return "#a16207";
  return "#6b7280";
}

function actColor(level) {
  if (level === "Very Active" || level === "Active") return {bg:"#dcfce7",fg:"#166534"};
  if (level === "Moderate") return {bg:"#fef9c3",fg:"#854d0e"};
  return {bg:"#fee2e2",fg:"#991b1b"};
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function getState(id) {
  if (!state[id]) {
    const p = prospects.find(x => x.id === id);
    const notes = p?.connection_notes || {};
    state[id] = { status: "pending", editNote: notes[SENDER] || "", feedback: "" };
  }
  return state[id];
}

function counts() {
  let a=0, s=0, p=0;
  prospects.forEach(pr => { const st = getState(pr.id).status; if (st==="approved") a++; else if (st==="skipped") s++; else p++; });
  return {approved:a, skipped:s, pending:p};
}

function updateCounts() {
  const c = counts();
  document.getElementById("n-pending").textContent = c.pending;
  document.getElementById("n-approved").textContent = c.approved;
  document.getElementById("n-skipped").textContent = c.skipped;
  document.getElementById("submit-counts").innerHTML = "<strong>"+c.approved+"</strong> approved &middot; <strong>"+c.skipped+"</strong> skipped &middot; <strong>"+c.pending+"</strong> pending";
  document.getElementById("submit-bar").className = c.approved > 0 ? "submit-bar show" : "submit-bar";
  const activeCount = prospects.filter(p => getState(p.id).status === "pending" && p.activity_level !== "Inactive" && p.activity_level !== "Low").length;
  document.getElementById("btn-approve-all").textContent = "Approve All Active Prospects (" + activeCount + ")";
  document.getElementById("btn-approve-all").style.display = c.pending > 0 ? "" : "none";
}

function setStatus(id, status) { getState(id).status = status; render(); }

function approveAll() {
  prospects.forEach(p => {
    if (getState(p.id).status === "pending" && p.activity_level !== "Inactive" && p.activity_level !== "Low") {
      getState(p.id).status = "approved";
    }
  });
  render();
}

function submitAll() {
  document.getElementById("main-view").style.display = "none";
  document.getElementById("submit-bar").style.display = "none";
  const c = counts();
  document.getElementById("confirm-body").innerHTML = c.approved + " prospect" + (c.approved!==1?"s":"") + " approved for outreach." + (c.skipped > 0 ? " " + c.skipped + " skipped." : "") + "<br>Connection requests will begin within 24 hours during business hours (8 AM–6 PM Pacific).";
  document.getElementById("confirm-view").className = "confirm show";
}

const openLists = new Set();
const openDetails = new Set();

function toggleList(key) { openLists.has(key) ? openLists.delete(key) : openLists.add(key); render(); }
function toggleDetail(key) { openDetails.has(key) ? openDetails.delete(key) : openDetails.add(key); render(); }

function render() {
  updateCounts();
  const grouped = {};
  prospects.forEach(p => {
    const k = p.company_universe_id || p.company_name || "x";
    if (!grouped[k]) grouped[k] = { co: companies[p.company_universe_id] || null, ps: [] };
    grouped[k].ps.push(p);
  });

  const entries = Object.entries(grouped);
  const hdrSub = prospects.length + " prospect" + (prospects.length!==1?"s":"") + " at " + entries.length + " compan" + (entries.length!==1?"ies":"y") + " ready for your review";
  document.getElementById("hdr-sub").textContent = hdrSub;

  let html = "";
  entries.forEach(([key, {co, ps}], gi) => {
    const name = co?.name || ps[0]?.company_name || "Unknown";
    const isOpen = openLists.has(key);
    const detOpen = openDetails.has(key);
    const nA = ps.filter(p => getState(p.id).status === "approved").length;
    const nS = ps.filter(p => getState(p.id).status === "skipped").length;
    const sc = co?.icp_score ? scoreColor(co.icp_score) : null;

    html += '<div class="co-row' + (isOpen?" open":"") + '" onclick="toggleList(\''+key+'\')" style="' + (gi===0?"border-radius:10px 10px 0 0;":"") + (gi===entries.length-1 && !isOpen?"border-radius:0 0 10px 10px;":"") + (gi>0?"border-top:none;":"") + '">';
    html += '<div class="co-l">';
    html += '<span class="co-chev' + (isOpen?" open":"") + '">&#9654;</span>';
    html += '<span class="co-name">' + esc(name) + '</span>';
    if (sc) html += '<span class="co-score" style="background:'+sc+'">' + co.icp_score + '</span>';
    html += '<span class="co-meta">' + ps.length + ' contact' + (ps.length!==1?"s":"") + '</span>';
    if (nA > 0) html += '<span class="co-badge" style="background:#f0fdf4;color:#15803d">&#10003; '+nA+'</span>';
    if (nS > 0) html += '<span class="co-badge" style="background:#f5f5f4;color:#78716c">'+nS+' skipped</span>';
    html += '</div><div class="co-r">';
    if (co) html += '<span class="co-meta">' + [co.industry, co.location].filter(Boolean).join(" &middot; ") + '</span>';
    if (co?.linkedin_url) html += '<a href="'+esc(co.linkedin_url)+'" target="_blank" class="co-link" onclick="event.stopPropagation()">LinkedIn &#8599;</a>';
    html += '</div></div>';

    html += '<div class="panel' + (isOpen?" open":"") + '" style="' + (gi===entries.length-1?"border-radius:0 0 10px 10px;":"") + '">';

    if (co) {
      html += '<div class="ctx"><div class="ctx-meta">' + [co.industry, co.location, co.revenue, co.ownership].filter(Boolean).join(" &middot; ");
      if (co.employees_linkedin) html += " &middot; " + co.employees_linkedin + " employees";
      html += '</div><button class="ctx-toggle" onclick="event.stopPropagation();toggleDetail(\''+key+'\')">' + (detOpen?"Hide details":"Why this company?") + '</button></div>';

      html += '<div class="detail' + (detOpen?" open":"") + '">';
      if (co.reasoning) html += '<div class="detail-section"><div class="detail-label">Why This Company</div><div class="detail-text">' + esc(co.reasoning) + '</div></div>';
      if (co.score_breakdown) {
        html += '<div class="detail-section"><div class="detail-label">Score Breakdown</div><div class="detail-pills">';
        co.score_breakdown.split(" | ").forEach(part => {
          const [dim, val] = part.split(": ");
          html += '<span class="detail-pill">' + esc(dim) + ': <strong>' + esc(val) + '</strong></span>';
        });
        html += '</div></div>';
      }
      if (co.li_description) html += '<div class="detail-section"><div class="detail-label">About</div><div class="detail-text">' + esc(co.li_description.slice(0,300)) + (co.li_description.length>300?"...":"") + '</div></div>';
      html += '</div>';
    }

    ps.forEach(p => {
      const st = getState(p.id);
      const isA = st.status === "approved";
      const isS = st.status === "skipped";
      const ac = actColor(p.activity_level);

      html += '<div class="prospect' + (isA?" approved":"") + (isS?" skipped":"") + '">';
      html += '<div class="p-head"><div>';
      html += '<div class="p-name">' + esc((p.first_name||"")+" "+(p.last_name||""));
      if (isA) html += ' <span class="badge badge-a">Approved</span>';
      if (isS) html += ' <span class="badge badge-s">Skipped</span>';
      html += '</div>';
      html += '<div class="p-title">' + esc(p.title||"") + '</div>';
      html += '<div class="p-tags">';
      if (p.activity_level) html += '<span class="p-act" style="background:'+ac.bg+';color:'+ac.fg+'">' + esc(p.activity_level) + '</span>';
      if (p.linkedin_connections != null) html += '<span class="p-conn">' + Number(p.linkedin_connections).toLocaleString() + ' connections</span>';
      if (p.email) html += '<span class="p-email">' + esc(p.email) + '</span>';
      html += '</div></div>';
      if (p.linkedin_url) html += '<a href="'+esc(p.linkedin_url)+'" target="_blank" class="p-link">Profile &#8599;</a>';
      html += '</div>';

      html += '<div class="note"><div class="note-label">Connection Note</div>';
      html += '<textarea class="note-area" rows="2" maxlength="200" ' + (isA||isS?"disabled":"") + ' oninput="getState(\''+p.id+'\').editNote=this.value;document.getElementById(\'nc-'+p.id+'\').textContent=this.value.length+\'/200\'">' + esc(st.editNote) + '</textarea>';
      html += '<div class="note-count" id="nc-'+p.id+'">' + st.editNote.length + '/200</div></div>';

      html += '<div class="actions">';
      html += '<input class="fb" type="text" placeholder="Feedback (optional)" value="' + esc(st.feedback) + '" ' + (isA||isS?"disabled":"") + ' oninput="getState(\''+p.id+'\').feedback=this.value">';
      if (!isA && !isS) {
        html += '<button class="btn-a" onclick="event.stopPropagation();setStatus(\''+p.id+'\',\'approved\')">Approve</button>';
        html += '<button class="btn-s" onclick="event.stopPropagation();setStatus(\''+p.id+'\',\'skipped\')">Skip</button>';
      } else {
        html += '<button class="btn-u" onclick="event.stopPropagation();setStatus(\''+p.id+'\',\'pending\')">Undo</button>';
      }
      html += '</div></div>';
    });

    html += '</div>';
  });

  document.getElementById("companies").innerHTML = html;
}

render();
</script>
</body>
</html>
